# docker-compose.yml (base defaults)

services:
  rag-main-db:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_pass
      POSTGRES_DB: rag
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-net

  rag-data-cache:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-net

  rag-message-broker:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: rag_user
      RABBITMQ_DEFAULT_PASS: rag_pass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - rag-net

  rag-vector-db:
    image: qdrant/qdrant:latest
    volumes:
      - vector-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - rag-net

  rag-auth-service:
    build: ./rag-auth-service
    env_file: .env
    environment:
      - MAIN_DB_URL=${MAIN_DB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      rag-main-db:
        condition: service_healthy
    volumes:
      - dp-keys-auth:/keys
    restart: unless-stopped
    networks:
      - rag-net

  rag-web-service:
    build: ./rag-web-service
    env_file: .env
    environment:
      - MESSAGE_BROKER_URL=${MESSAGE_BROKER_URL}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - DATA_CACHE_URL=${DATA_CACHE_URL}
      - MAIN_DB_URL=${MAIN_DB_URL}
    depends_on:
      rag-message-broker:
        condition: service_started
      rag-data-cache:
        condition: service_healthy
      rag-auth-service:
        condition: service_started
    volumes:
      - dp-keys-web:/keys
    restart: unless-stopped
    networks:
      - rag-net

  rag-background-worker:
    build: ./rag-background-worker
    env_file: .env
    environment:
      - MESSAGE_BROKER_URL=${MESSAGE_BROKER_URL}
      - DATA_CACHE_URL=${DATA_CACHE_URL}
      - VECTOR_DB_URL=${VECTOR_DB_URL}
      - MAIN_DB_URL=${MAIN_DB_URL}
      - AI_HOST_URL=${AI_HOST_URL}
      - AI_HOST_API_KEY=${AI_HOST_API_KEY}
      - AI_HOST_LM_NAME=${AI_HOST_LM_NAME}
    depends_on:
      rag-message-broker:
        condition: service_started
      rag-data-cache:
        condition: service_healthy
      rag-vector-db:
        condition: service_started
      rag-main-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-net

  rag-client-app:
    build:
      context: ./rag-client-app
      args:
        AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
        WEB_SERVICE_URL: ${WEB_SERVICE_URL}
    env_file: .env
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - WEB_SERVICE_URL=${WEB_SERVICE_URL}
    depends_on:
      - rag-auth-service
      - rag-web-service
    restart: unless-stopped
    networks:
      - rag-net

volumes:
  db-data:
  vector-data:
  dp-keys-auth:
  dp-keys-web:

networks:
  rag-net:
    driver: bridge
