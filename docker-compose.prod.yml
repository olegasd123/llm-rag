# docker-compose.prod.yml (production overrides)

services:
  rag-main-db:
    # Do not expose DB to host in prod
    # Add conservative resource limits
    mem_limit: 1g
    cpus: "1.0"

  rag-data-cache:
    mem_limit: 512m
    cpus: "0.5"

  rag-message-broker:
    mem_limit: 512m
    cpus: "0.5"

  rag-vector-db:
    mem_limit: 1g
    cpus: "1.0"

  rag-auth-service:
    mem_limit: 512m
    cpus: "0.5"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "5001:8080"

  rag-web-service:
    mem_limit: 768m
    cpus: "0.75"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "5002:8080"

  rag-background-worker:
    mem_limit: 1g
    cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp

  rag-client-app:
    mem_limit: 256m
    cpus: "0.5"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "3000:3000"

