# docker-compose.prod.yml (production overrides)

services:
  main-db:
    # Do not expose DB to host in prod
    # Add conservative resource limits
    mem_limit: 1g
    cpus: "1.0"

  data-cache:
    mem_limit: 512m
    cpus: "0.5"

  message-broker:
    mem_limit: 512m
    cpus: "0.5"

  vector-db:
    mem_limit: 1g
    cpus: "1.0"

  auth-service:
    mem_limit: 512m
    cpus: "0.5"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "5001:8080"

  web-service:
    mem_limit: 768m
    cpus: "0.75"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "5002:8080"

  background-worker:
    mem_limit: 1g
    cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp

  client-app:
    mem_limit: 256m
    cpus: "0.5"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "3000:3000"

