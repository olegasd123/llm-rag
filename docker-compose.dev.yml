# docker-compose.dev.yml (development overrides)

services:
  main-db:
    ports:
      - "5433:5432"

  data-cache:
    ports:
      - "6379:6379"

  message-broker:
    ports:
      - "15672:15672"   # RabbitMQ management UI
      - "5672:5672"     # AMQP for local tools

  vector-db:
    ports:
      - "6333:6333"     # Qdrant http

  auth-service:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5001:8080"

  web-service:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5002:8080"

  client-app:
    ports:
      - "3000:3000"

