# docker-compose.dev.yml (development overrides)

services:
  rag-main-db:
    ports:
      - "5433:5432"

  rag-data-cache:
    ports:
      - "6379:6379"

  rag-message-broker:
    ports:
      - "15672:15672"   # RabbitMQ management UI
      - "5672:5672"     # AMQP for local tools

  rag-vector-db:
    ports:
      - "6333:6333"     # Qdrant http

  rag-auth-service:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5001:8080"

  rag-web-service:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5002:8080"

  rag-client-app:
    ports:
      - "3000:3000"

